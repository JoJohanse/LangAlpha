# Development docker-compose — full-stack local setup
# Usage: cp .env.example .env && <fill in API keys> && docker compose up
#
# By default, starts PostgreSQL and Redis in Docker (COMPOSE_PROFILES=infra in .env).
# To use an external database/Redis, remove COMPOSE_PROFILES from .env and set
# DB_HOST, REDIS_URL to your own instances.

services:
  postgres:
    profiles: ["infra"]
    image: postgres:18.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - langalpha-postgresql-data:/var/lib/postgresql
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    profiles: ["infra"]
    image: redis:7.4.2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - langalpha-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-langalpha/backend:phase1-mvp-20260422}
    restart: unless-stopped
    init: true
    pids_limit: 8192
    mem_limit: 8g
    memswap_limit: 8g
    env_file: .env
    environment:
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY:-langalpha-local-dev-encryption-key}
      DB_HOST: ${DB_HOST:-postgres}
      REDIS_URL: "${REDIS_URL:-redis://:${REDIS_PASSWORD:-redis}@redis:6379/0}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web_assets:
    image: ${WEB_IMAGE:-langalpha/web:phase1-mvp-20260422}
    command: >
      sh -lc "rm -rf /frontend/* && cp -r /dist/. /frontend/"
    restart: "no"
    volumes:
      - langalpha-frontend-dist:/frontend

  frontend:
    image: nginx:1.26-alpine
    restart: unless-stopped
    depends_on:
      web_assets:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    volumes:
      - langalpha-frontend-dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  langalpha-postgresql-data:
  langalpha-redis-data:
  langalpha-frontend-dist:
